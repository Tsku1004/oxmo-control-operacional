<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etiqueta OXMO</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: #eceff3;
        font-family: Arial, sans-serif;
        color: #111;
      }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 12px; }
      .label-page {
        width: 100mm;
        height: 150mm;
        padding: 2mm;
        background: #fff;
        box-shadow: 0 12px 34px #0003;
        overflow: hidden;
      }
      .label {
        width: 96mm;
        height: 146mm;
        border: 1mm solid #111;
        border-radius: 3mm;
        padding: 4mm 5mm 2.6mm;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 4mm;
        align-items: flex-start;
        border-bottom: .45mm solid #111;
        padding-bottom: 1.6mm;
      }
      header img {
        width: 38mm;
        max-height: 14mm;
        height: auto;
        object-fit: contain;
      }
      .system {
        font-size: 9pt;
        font-weight: 900;
        letter-spacing: 1.2pt;
        text-align: right;
      }
      .date {
        font-size: 7pt;
        color: #555;
        text-align: right;
        margin-top: 1mm;
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        padding-top: 1.4mm;
        min-height: 0;
      }
      .lot-id {
        font-family: Consolas, monospace;
        font-size: clamp(14pt, var(--id-size, 22pt), 22pt);
        font-weight: 900;
        text-align: center;
        line-height: 1.02;
        margin-bottom: 1.5mm;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .material {
        border: .55mm solid var(--accent);
        color: var(--accent);
        border-radius: 2mm;
        padding: 1.4mm;
        font-size: 14pt;
        font-weight: 900;
        text-align: center;
        margin-bottom: 2mm;
      }
      .chem {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.7mm;
        margin-bottom: 2mm;
      }
      .chem div, .meta div {
        border: .35mm solid #222;
        border-radius: 1.5mm;
        padding: 1.2mm;
        text-align: center;
      }
      .chem b, .meta b {
        display: block;
        font-size: 7pt;
        text-transform: uppercase;
        color: #555;
        margin-bottom: .6mm;
      }
      .chem span {
        font-family: Consolas, monospace;
        font-size: 13pt;
        font-weight: 900;
      }
      .meta {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5mm;
        margin-bottom: 7mm;
      }
      .meta span {
        font-size: 9.5pt;
        font-weight: 800;
      }
      .qr {
        width: var(--qr-size, 29mm);
        height: var(--qr-size, 29mm);
        align-self: center;
        image-rendering: pixelated;
        margin-top: 0;
        margin-bottom: 1mm;
        flex: 0 0 auto;
      }
      footer {
        border-top: .35mm solid #111;
        margin-top: 0;
        padding-top: .7mm;
        font-size: 5.5pt;
        text-align: center;
        color: #555;
      }
      .bad {
        width: min(420px, 100%);
        border-top: 4px solid #ff4560;
        border-radius: 8px;
        background: #fff;
        padding: 22px;
        box-shadow: 0 12px 34px #0002;
      }
      @media print {
        @page { size: 100mm 150mm; margin: 0; }
        body { background: #fff; }
        .wrap { padding: 0; display: block; }
        .label-page { box-shadow: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const qs = new URLSearchParams(location.search);
      const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
      const data = {
        id: qs.get("id") || "",
        mat: qs.get("mat") || "",
        color: qs.get("color") || "#00D4FF",
        masa: qs.get("masa") || "",
        cu: qs.get("cu") || "-",
        mo: qs.get("mo") || "-",
        s: qs.get("s") || "-",
        fecha: qs.get("fecha") || "",
      };
      if (!data.id) {
        document.querySelector("#root").innerHTML = `<div class="wrap"><section class="bad"><h1>QR no valido</h1><p>Genera nuevamente la etiqueta desde OXMO.</p></section></div>`;
      } else {
        const qrData = encodeURIComponent(location.href);
        document.documentElement.style.setProperty("--accent", data.color);
        const idLen = String(data.id || "").length;
        document.documentElement.style.setProperty("--qr-size", idLen > 24 ? "25mm" : idLen > 18 ? "27mm" : "29mm");
        document.documentElement.style.setProperty("--id-size", idLen > 24 ? "14pt" : idLen > 18 ? "16pt" : "22pt");
        document.querySelector("#root").innerHTML = `<div class="wrap">
          <section class="label-page">
            <div class="label">
              <header>
                <img src="./molyb-logo.webp" alt="Molyb" />
                <div>
                  <div class="system">OXMO CONTROL</div>
                  <div class="date">${esc(data.fecha)}</div>
                </div>
              </header>
              <main>
                <div class="lot-id">${esc(data.id)}</div>
                <div class="material">${esc(data.mat.toUpperCase())}</div>
                <div class="chem">
                  <div><b>Cu</b><span>${esc(data.cu)}%</span></div>
                  <div><b>Mo</b><span>${esc(data.mo)}%</span></div>
                  <div><b>S</b><span>${esc(data.s)}%</span></div>
                </div>
                <div class="meta"><div><b>Masa</b><span>${esc(data.masa)}</span></div></div>
                <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=420x420&data=${qrData}" alt="QR ${esc(data.id)}" />
              </main>
              <footer>Copia digital etiqueta OXMO - Zebra ZT230 - 100 x 150 mm</footer>
            </div>
          </section>
        </div>`;
      }
    </script>
  </body>
</html>
