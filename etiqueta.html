<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etiqueta OXMO</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: #eceff3;
        font-family: Arial, Helvetica, sans-serif;
        color: #111;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 12px;
      }
      .label-page {
        width: 100mm;
        height: 150mm;
        padding: 3mm;
        background: #fff;
        box-shadow: 0 12px 34px #0003;
        overflow: hidden;
      }
      .label {
        width: 94mm;
        height: 144mm;
        border: .8mm solid #111;
        border-radius: 2.5mm;
        padding: 4.5mm 5mm 2.8mm;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header {
        min-height: 19mm;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 4mm;
        border-bottom: .45mm solid #111;
        padding-bottom: 2.2mm;
      }
      header img {
        width: 32mm;
        max-height: 14mm;
        height: auto;
        object-fit: contain;
        margin-top: 1.2mm;
      }
      .system {
        font-size: 10pt;
        line-height: 1.15;
        font-weight: 900;
        letter-spacing: 2.1pt;
        text-align: right;
        white-space: pre-line;
      }
      .date {
        font-size: 7pt;
        color: #333;
        text-align: right;
        margin-top: 1.6mm;
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        min-height: 0;
        padding-top: 3mm;
      }
      .lot-id {
        font-family: Consolas, "Courier New", monospace;
        font-size: clamp(14pt, var(--id-size, 20pt), 20pt);
        font-weight: 900;
        text-align: center;
        line-height: 1.05;
        letter-spacing: .2pt;
        margin: 0 0 3mm;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .material {
        min-height: 13mm;
        border: .55mm solid var(--accent);
        color: var(--accent);
        border-radius: 2mm;
        padding: 1.7mm 2mm;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16pt;
        font-weight: 900;
        letter-spacing: 1.2pt;
        text-align: center;
        margin-bottom: 3mm;
      }
      .chem {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2mm;
        margin-bottom: 3mm;
      }
      .chem div,
      .meta div {
        border: .35mm solid #222;
        border-radius: 1.5mm;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .chem div { min-height: 14mm; padding: 1.4mm 1mm; }
      .meta div { min-height: 13mm; padding: 1.4mm; }
      .chem b,
      .meta b {
        display: block;
        font-size: 6.5pt;
        line-height: 1;
        text-transform: uppercase;
        color: #111;
        margin-bottom: 1mm;
        letter-spacing: .3pt;
      }
      .chem span {
        font-family: Consolas, "Courier New", monospace;
        font-size: 13.5pt;
        line-height: 1;
        font-weight: 900;
      }
      .meta {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2mm;
        margin-bottom: 2mm;
      }
      .meta span {
        font-size: 12pt;
        line-height: 1;
        font-weight: 900;
      }
      .qr-zone {
        flex: 1;
        min-height: 42mm;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1mm 0 1.5mm;
      }
      .qr {
        width: var(--qr-size, 40mm);
        height: var(--qr-size, 40mm);
        image-rendering: pixelated;
        object-fit: contain;
        display: block;
      }
      footer {
        border-top: .35mm solid #111;
        padding-top: .8mm;
        font-size: 5.5pt;
        line-height: 1.2;
        text-align: center;
        color: #555;
      }
      .bad {
        width: min(420px, 100%);
        border-top: 4px solid #ff4560;
        border-radius: 8px;
        background: #fff;
        padding: 22px;
        box-shadow: 0 12px 34px #0002;
      }
      @media print {
        @page { size: 100mm 150mm; margin: 0; }
        html, body { width: 100mm; height: 150mm; background: #fff; }
        .wrap { min-height: 150mm; padding: 0; display: block; }
        .label-page { box-shadow: none; margin: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const qs = new URLSearchParams(location.search);
      const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
      const data = {
        id: qs.get("id") || "",
        mat: qs.get("mat") || "",
        color: qs.get("color") || "#00D4FF",
        masa: qs.get("masa") || "",
        cu: qs.get("cu") || "-",
        mo: qs.get("mo") || "-",
        s: qs.get("s") || "-",
        fecha: qs.get("fecha") || "",
      };
      if (!data.id) {
        document.querySelector("#root").innerHTML = `<div class="wrap"><section class="bad"><h1>QR no valido</h1><p>Genera nuevamente la etiqueta desde OXMO.</p></section></div>`;
      } else {
        const qrData = encodeURIComponent(location.href);
        document.documentElement.style.setProperty("--accent", data.color);
        const idLen = String(data.id || "").length;
        document.documentElement.style.setProperty("--id-size", idLen > 26 ? "14pt" : idLen > 20 ? "16pt" : "20pt");
        document.querySelector("#root").innerHTML = `<div class="wrap">
          <section class="label-page">
            <div class="label">
              <header>
                <img src="./molyb-logo.webp" alt="Molyb" />
                <div>
                  <div class="system">OXMO\nCONTROL</div>
                  <div class="date">${esc(data.fecha)}</div>
                </div>
              </header>
              <main>
                <div class="lot-id">${esc(data.id)}</div>
                <div class="material">${esc(data.mat.toUpperCase())}</div>
                <div class="chem">
                  <div><b>Cu</b><span>${esc(data.cu)}%</span></div>
                  <div><b>Mo</b><span>${esc(data.mo)}%</span></div>
                  <div><b>S</b><span>${esc(data.s)}%</span></div>
                </div>
                <div class="meta"><div><b>Masa</b><span>${esc(data.masa)}</span></div></div>
                <div class="qr-zone"><img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=520x520&margin=1&data=${qrData}" alt="QR ${esc(data.id)}" /></div>
              </main>
              <footer>Zebra ZT230 · Etiqueta 100 × 150 mm · 300 dpi</footer>
            </div>
          </section>
        </div>`;
      }
    </script>
  </body>
</html>
